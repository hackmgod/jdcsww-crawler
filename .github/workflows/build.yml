name: Build Executable

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
        python-version: ['3.12']
      fail-fast: false

    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install PyInstaller
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller

    - name: Install dependencies
      run: |
        pip install openpyxl

    - name: Build with PyInstaller (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        pyinstaller --onefile --name=JDCCrawler --console --clean crawl_production_enhanced.py

    - name: Build with PyInstaller (macOS/Linux)
      if: matrix.os != 'windows-latest'
      run: |
        pyinstaller --onefile --name=JDCCrawler --console --clean crawl_production_enhanced.py

    - name: Create output directory
      run: |
        mkdir -p package

    - name: Copy files (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        copy dist\JDCCrawler.exe package\
        copy EXE使用说明.txt package\
        copy README.txt package\

    - name: Copy files (macOS/Linux)
      if: matrix.os != 'windows-latest'
      run: |
        cp dist/JDCCrawler package/
        cp EXE使用说明.txt package/
        cp README.txt package/

    - name: Create archive (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        cd package
        7z a -tzip ../JDCCrawler-windows.zip *

    - name: Create archive (macOS/Linux)
      if: matrix.os != 'windows-latest'
      run: |
        cd package
        tar -czf ../JDCCrawler-${{ matrix.os }}.tar.gz *

    - name: Upload artifact (Windows)
      if: matrix.os == 'windows-latest'
      uses: actions/upload-artifact@v4
      with:
        name: JDCCrawler-windows
        path: JDCCrawler-windows.zip

    - name: Upload artifact (macOS)
      if: matrix.os == 'macos-latest'
      uses: actions/upload-artifact@v4
      with:
        name: JDCCrawler-macos
        path: JDCCrawler-macos-latest.tar.gz

    - name: Upload artifact (Linux)
      if: matrix.os == 'ubuntu-latest'
      uses: actions/upload-artifact@v4
      with:
        name: JDCCrawler-linux
        path: JDCCrawler-ubuntu-latest.tar.gz

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          JDCCrawler-windows.zip
          JDCCrawler-macos-latest.tar.gz
          JDCCrawler-ubuntu-latest.tar.gz
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
